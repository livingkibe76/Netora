<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/login&signup.css" />
    <title>Login page</title>
  </head>
  <body>
    <section class="login-section">
      <div>
        <div><img src="/images/logo.png" alt="" class="logo-img" /></div>
        <div></div>
        <div class="login-selector">
          <div><h1>Welcome Back</h1></div>
          <br />
          <div><p>Sign In to Access to Your Account</p></div>
          <br />
          <div class="create-section">
            <div><label>Email Address</label></div>
            <div><input type="email" placeholder="Enter Your ISP Mail" /></div>
            <br />
            <div>
              <label>Password</label>
            </div>
            <div>
              <input type="password" placeholder="Enter your Password" />
            </div>
            <br />
            <div><button>Sign in</button></div>
            <br />
            <div class="para-or">
              <span>Or</span>
            </div>
            <br />
            <div><p>Dont have An Account? Create One Free</p></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
